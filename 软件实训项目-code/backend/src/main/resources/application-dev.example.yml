# ==========================================
# 开发环境配置示例（复制为 application-dev.yml 并填入实际值）
# ==========================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/career_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  sql:
    init:
      mode: always
      continue-on-error: true

  mail:
    host: smtp.example.com
    port: 465
    username: your-email@example.com
    password: your-email-password
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true

management:
  health:
    mail:
      enabled: false

logging:
  level:
    com.xuelian.career: debug
    org.springframework.web: info

# DeepSeek API Key（在 https://platform.deepseek.com/ 申请）
deepseek:
  api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}

recommend:
  scoring:
    weight-skill: 0.30
    weight-assessment: 0.25
    weight-learning: 0.15
    weight-learning-result: 0.20
    weight-basic: 0.10
